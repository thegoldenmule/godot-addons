[plugin]

name="Remote Config Editor"
description="Aggregate committed content blobs (per a project-supplied manifest) into one backend remote-config document, copy the full publish payload, and optionally check live drift via a configured comparator. Game-agnostic; configured per project via res://remote_config_editor.config.json. Sourced from github.com/thegoldenmule/godot-addons; managed by the Editor Tool Kit panel."
author="thegoldenmule"
version="0.1.0"
script="plugin.gd"

[update]

source="thegoldenmule/godot-addons"
branch="main"
prefix="addons/remote_config_editor/"
