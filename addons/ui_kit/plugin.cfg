[plugin]

name="UI Kit"
description="Generic UI shell infrastructure: an async stack-FSM router (UiRouter), UiState, UiScreenScaffold, control registration (UiReg), and a semantic UI/navigation automation driver (UiDriver). Sourced from github.com/thegoldenmule/godot-addons; mounts a UI Kit panel that self-updates from that repo."
author="thegoldenmule"
version="0.1.0"
script="plugin.gd"
